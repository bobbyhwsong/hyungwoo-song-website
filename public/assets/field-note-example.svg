<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Example field note visual</title>
  <desc id="desc">A warm abstract desk scene with a notebook, sea-colored gradient, and small paper fragments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f2ea"/>
      <stop offset="0.48" stop-color="#eaf2f2"/>
      <stop offset="1" stop-color="#f5dfcd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#1f2523" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="1010" cy="130" r="190" fill="#d6a085" opacity="0.22"/>
  <circle cx="170" cy="610" r="240" fill="#497a8a" opacity="0.18"/>
  <g filter="url(#shadow)">
    <rect x="240" y="120" width="600" height="450" rx="28" fill="#fffdf8" stroke="#d8cfc0"/>
    <line x1="300" y1="205" x2="760" y2="205" stroke="#d8cfc0" stroke-width="3"/>
    <line x1="300" y1="270" x2="720" y2="270" stroke="#d8cfc0" stroke-width="3"/>
    <line x1="300" y1="335" x2="780" y2="335" stroke="#d8cfc0" stroke-width="3"/>
    <line x1="300" y1="400" x2="640" y2="400" stroke="#d8cfc0" stroke-width="3"/>
    <text x="300" y="165" font-family="Georgia, serif" font-size="44" fill="#18201d">What counts as help?</text>
  </g>
  <g transform="rotate(-8 820 510)" filter="url(#shadow)">
    <rect x="680" y="420" width="260" height="170" rx="18" fill="#fff8dc" stroke="#e5d8a0"/>
    <text x="710" y="478" font-family="ui-monospace, monospace" font-size="20" fill="#58645f">field note</text>
    <text x="710" y="522" font-family="Georgia, serif" font-size="30" fill="#18201d">scaffold,</text>
    <text x="710" y="558" font-family="Georgia, serif" font-size="30" fill="#18201d">not substitute</text>
  </g>
  <path d="M120 138 C260 70, 335 98, 468 78" stroke="#497a8a" stroke-width="6" opacity="0.35" fill="none"/>
  <path d="M820 682 C930 620, 1015 632, 1110 572" stroke="#8aa68a" stroke-width="6" opacity="0.35" fill="none"/>
</svg>
